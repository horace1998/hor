<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    
    <!-- Preconnect to speed up external assets (Zero UI Change, highly efficient) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://picsum.photos" />
    <link rel="preconnect" href="https://fastly.picsum.photos" />

    <script>
      window.addEventListener('error', function(e) {
        var errDiv = document.createElement('div');
        errDiv.style.position = 'fixed';
        errDiv.style.top = '0';
        errDiv.style.left = '0';
        errDiv.style.width = '100vw';
        errDiv.style.height = '100vh';
        errDiv.style.backgroundColor = 'red';
        errDiv.style.color = 'white';
        errDiv.style.zIndex = '999999';
        errDiv.style.padding = '20px';
        errDiv.style.fontFamily = 'monospace';
        errDiv.style.overflow = 'auto';
        errDiv.innerHTML = '<h1>GLOBAL JS ERROR</h1>' + 
          '<p><strong>Message:</strong> ' + e.message + '</p>' +
          '<p><strong>File:</strong> ' + e.filename + ' : ' + e.lineno + '</p>' +
          '<pre>' + (e.error && e.error.stack ? e.error.stack : '') + '</pre>';
        document.body.appendChild(errDiv);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var errDiv = document.createElement('div');
        errDiv.style.position = 'fixed';
        errDiv.style.top = '0';
        errDiv.style.left = '0';
        errDiv.style.width = '100vw';
        errDiv.style.height = '100vh';
        errDiv.style.backgroundColor = '#880000';
        errDiv.style.color = 'white';
        errDiv.style.zIndex = '999999';
        errDiv.style.padding = '20px';
        errDiv.style.fontFamily = 'monospace';
        errDiv.style.overflow = 'auto';
        errDiv.innerHTML = '<h1>UNHANDLED PROMISE REJECTION</h1>' + 
          '<p><strong>Reason:</strong> ' + (e.reason && e.reason.message ? e.reason.message : e.reason) + '</p>' +
          '<pre>' + (e.reason && e.reason.stack ? e.reason.stack : '') + '</pre>';
        document.body.appendChild(errDiv);
      });
    </script>
  </head>
  <body style="background-color: black; margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; color: white;">
    <div id="root" style="width: 100%; height: 100%; min-height: 100vh; background-color: black;"></div>
    <script type="module" src="/src/main.tsx"></script>
    <div id="loading-fallback" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:#333; font-family:sans-serif; font-size:10px; tracking:0.5em; text-transform:uppercase;">
      Re-Syncing Neural Portal...
    </div>
  </body>
</html>
